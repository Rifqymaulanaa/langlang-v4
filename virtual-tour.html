<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="icon" type="image/png" href="logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Tour 360° — Langlang</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    /* Mobile-first Layout & Styles (max-width: 768px default) */
    .vt-wrapper {
      position: relative;
      width: 100%;
      height: calc(100vh - var(--navbar-mobile-height) - var(--navbar-mobile-height));
      min-height: 500px;
      background-color: #0f172a;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .vt-viewer-pane {
      position: relative;
      flex: 1;
      width: 100%;
      min-height: 0; /* Prevents flex items from overflowing */
      cursor: grab;
      overflow: hidden;
      z-index: 1;
    }

    .vt-viewer-pane:active {
      cursor: grabbing;
    }

    /* 3D Panorama Simulation Canvas */
    .vt-panorama-canvas {
      position: absolute;
      width: 300%; /* Triple width to allow dragging */
      height: 100%;
      top: 0;
      left: 0;
      transform: translateX(-33.33%); /* Centered initially before JS */
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      z-index: 2;
      transition: opacity 0.3s ease-in-out;
      background: #0f172a;
    }

    /* Immersive details on background */
    .panorama-bg-art {
      width: 100%;
      height: 100%;
      background-size: 200% 100%;
      background-position: center center;
      background-repeat: repeat-x;
      position: absolute;
      top: 0;
      left: 0;
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    /* Subtle vignette overlay for depth */
    .panorama-bg-art::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.1) 0%,
        rgba(0,0,0,0) 40%,
        rgba(0,0,0,0) 60%,
        rgba(0,0,0,0.25) 100%
      );
      pointer-events: none;
      z-index: 1;
    }

    /* Hotspots floating in scene */
    .vt-hotspot {
      position: absolute;
      width: 42px;
      height: 42px;
      background-color: var(--white);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary-green);
      box-shadow: var(--shadow-lg);
      cursor: pointer;
      z-index: 10;
      transition: var(--transition-normal);
      border: 2px solid var(--accent-lime);
    }

    .vt-hotspot:hover {
      transform: scale(1.15);
      background-color: var(--accent-lime);
      color: var(--white);
    }

    /* Info Overlay Panel (Mobile Compact) */
    .vt-panel {
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--white);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 100;
    }

    .vt-panel-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .vt-info-section {
      flex: 1;
      min-width: 0;
    }

    .vt-panel-badges {
      display: flex;
      gap: 6px;
      margin-bottom: 4px;
    }

    .vt-panel-badges .badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .vt-info-section h2 {
      color: var(--white);
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 2px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .vt-info-section p {
      font-size: 0.75rem;
      color: var(--gray-400);
      margin-bottom: 0;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .vt-action-section {
      flex-shrink: 0;
    }

    .vt-cta-text {
      display: none;
    }

    .vt-action-section .btn {
      font-size: 0.8rem;
      padding: 6px 12px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .vt-scenes-section {
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 8px;
    }

    .vt-scenes-section .form-label {
      display: block;
      font-size: 0.75rem;
      color: var(--gray-400);
      margin-bottom: 6px;
    }

    .scene-thumbnail-grid {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none; /* Hide scrollbar for Firefox */
    }

    .scene-thumbnail-grid::-webkit-scrollbar {
      display: none; /* Hide scrollbar for Chrome, Safari and Opera */
    }

    .scene-thumb {
      flex-shrink: 0;
      min-width: 90px;
      border-radius: 8px;
      border: 2px solid transparent;
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--gray-300);
      cursor: pointer;
      text-align: center;
      font-size: 0.75rem;
      font-weight: 700;
      transition: var(--transition-fast);
      white-space: nowrap;
    }

    .scene-thumb.active, .scene-thumb:hover {
      border-color: var(--accent-lime);
      background: rgba(111, 207, 61, 0.1);
      color: var(--white);
    }

    /* Tutorial Gesture Hand Overlay */
    .vt-tutorial-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(4px);
      z-index: 15;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--white);
      text-align: center;
      opacity: 1;
      pointer-events: none;
      transition: opacity 0.8s ease-out;
      padding: 24px;
    }

    .vt-hand-icon {
      width: 56px;
      height: 56px;
      fill: none;
      stroke: var(--white);
      stroke-width: 2;
      animation: swipe-hand 2s ease-in-out infinite;
    }

    @keyframes swipe-hand {
      0%, 100% { transform: translateX(-30px) rotate(-10deg); }
      50% { transform: translateX(30px) rotate(10deg); }
    }

    /* Hotspot Detail Tooltip overlay */
    .hotspot-tooltip {
      position: absolute;
      background: var(--white);
      color: var(--deep-charcoal);
      border-radius: var(--radius-md);
      padding: 12px;
      width: 240px;
      box-shadow: var(--shadow-xl);
      border: 1px solid var(--gray-200);
      z-index: 25;
      display: none;
      pointer-events: all;
    }

    .hotspot-tooltip-title {
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 4px;
      color: var(--primary-green);
      padding-right: 16px; /* Space for close button */
    }

    .hotspot-tooltip-desc {
      font-size: 0.8rem;
      color: var(--gray-600);
      line-height: 1.4;
    }

    /* Desktop View adjustments (min-width: 769px) */
    @media (min-width: 769px) {
      .vt-wrapper {
        display: grid;
        grid-template-columns: 1fr 340px;
        height: calc(100vh - var(--navbar-height));
      }

      .vt-viewer-pane {
        flex: none;
        height: 100%;
      }

      .vt-panel {
        height: 100%;
        border-top: none;
        border-left: 1px solid rgba(255, 255, 255, 0.1);
        padding: 24px;
        justify-content: space-between;
        gap: 24px;
      }

      .vt-panel-content {
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-start;
        gap: 24px;
      }

      .vt-info-section {
        width: 100%;
      }

      .vt-panel-badges {
        margin-bottom: 8px;
        gap: 8px;
      }

      .vt-panel-badges .badge {
        font-size: 0.75rem;
        padding: 4px 8px;
      }

      .vt-info-section h2 {
        font-size: 1.6rem;
        margin-bottom: 8px;
        line-height: 1.3;
        white-space: normal;
        overflow: visible;
        text-overflow: clip;
      }

      .vt-info-section p {
        font-size: 0.85rem;
        color: var(--gray-400);
      }

      .vt-action-section {
        width: 100%;
        align-items: stretch;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        padding-top: 16px;
      }

      .vt-cta-text {
        display: block;
        font-size: 0.8rem;
        color: var(--gray-400);
        text-align: center;
        margin-bottom: 8px;
      }

      .vt-action-section .btn {
        width: 100%;
        font-size: 0.9rem;
        padding: 12px 24px;
        height: auto;
      }

      .vt-scenes-section {
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        padding-top: 16px;
        margin-top: auto;
      }

      .vt-scenes-section .form-label {
        font-size: 0.85rem;
        margin-bottom: 8px;
      }

      .scene-thumbnail-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        overflow-x: visible;
        padding-bottom: 0;
      }

      .scene-thumb {
        min-width: 0;
        font-size: 0.8rem;
        padding: 8px;
        white-space: normal;
      }

      .vt-hand-icon {
        width: 64px;
        height: 64px;
      }

      @keyframes swipe-hand {
        0%, 100% { transform: translateX(-40px) rotate(-10deg); }
        50% { transform: translateX(40px) rotate(10deg); }
      }
    }
  </style>
</head>
<body>

  <!-- Header Placeholder -->
  <div id="header-placeholder"></div>

  <!-- Fullscreen Immersive Wrapper -->
  <div class="vt-wrapper">
    
    <!-- Left: Virtual Reality Viewer (P0) -->
    <div class="vt-viewer-pane" id="vt-drag-area">
      
      <!-- Tutorial Gesture overlay (PRD 4.4) -->
      <div class="vt-tutorial-overlay" id="vt-tutorial">
        <svg class="vt-hand-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 11c0-1.1-.9-2-2-2s-2 .9-2 2v4.5l-2.1-.6c-.7-.2-1.4.1-1.8.7-.3.5-.2 1.2.3 1.6l4.2 3.6c.4.3.9.5 1.4.5h6c1.1 0 2-.9 2-2V13c0-1.1-.9-2-2-2s-2 .9-2 2v-2c0-1.1-.9-2-2-2s-2 .9-2 2v-4c0-1.1-.9-2-2-2s-2 .9-2 2v7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h3 style="color: var(--white); margin-top: var(--space-2);">Seret Layar ke Kiri atau Kanan</h3>
        <p style="color: var(--gray-300); font-size: 0.9rem; margin-top: 4px;">Untuk memutar sudut pandang panorama 360°</p>
      </div>

      <!-- Moving Canvas (3D Cylinder view simulator) -->
      <div class="vt-panorama-canvas" id="vt-canvas">
        <div class="panorama-bg-art" id="vt-bg-layer">
          
          <!-- Interactive Hotspots will be dynamically placed relative to percentage width of panorama -->
          
        </div>
      </div>

      <!-- Floating hotspot detail tooltip -->
      <div class="hotspot-tooltip" id="vt-tooltip">
        <button class="popup-close" id="vt-tooltip-close" style="width:16px; height:16px; top:6px; right:6px; font-size: 0.6rem;">&times;</button>
        <div class="hotspot-tooltip-title" id="vt-tooltip-title">Flora Endemik</div>
        <div class="hotspot-tooltip-desc" id="vt-tooltip-desc">Detail deskripsi hotspot.</div>
      </div>

    </div>

    <!-- Right: Scene Selectors & Info Panel (P0) -->
    <aside class="vt-panel">
      
      <!-- Top Section: Info & Action -->
      <div class="vt-panel-content">
        
        <!-- Destination Info -->
        <div class="vt-info-section">
          <div class="vt-panel-badges">
            <span class="badge badge-eco">Virtual 360°</span>
            <span class="badge badge-cuaca" id="vt-panel-temp">26°C</span>
          </div>
          
          <h2 id="vt-dest-name">Nama Destinasi</h2>
          
          <p id="vt-dest-loc">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <span>Lokasi Desa</span>
          </p>
        </div>

        <!-- Call To Action -->
        <div class="vt-action-section">
          <div class="vt-cta-text">Tertarik mengunjungi langsung?</div>
          <a href="" class="btn btn-primary btn-full" id="vt-order-ticket-btn">Pesan Tiket Sekarang</a>
        </div>

      </div>

      <!-- Bottom Section: Scene Selectors -->
      <div class="vt-scenes-section">
        <label class="form-label">Pilih Sudut Pandang:</label>
        <div class="scene-thumbnail-grid" id="vt-scenes-thumbs">
          <!-- Scene thumbnail buttons will be injected by virtual-tour.js -->
        </div>
      </div>

    </aside>

  </div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/virtual-tour.js"></script>
</body>
</html>
